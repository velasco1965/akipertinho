<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estabelecimento · Aki‑pertinho</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',Roboto,sans-serif; }
        body { background:#ffe6e6; padding:1rem; }
        .container { max-width:1200px; margin:0 auto; background:white; border-radius:40px; padding:2rem; box-shadow:0 20px 40px rgba(230,57,70,0.15); }
        .btn-voltar {
            background:white; border:2px solid #e63946; color:#e63946; padding:10px 25px; border-radius:40px;
            display:inline-flex; align-items:center; gap:8px; margin-bottom:20px; cursor:pointer;
            transition:0.3s;
        }
        .btn-voltar:hover { background:#e63946; color:white; }
        .subbairro-tarja {
            background:#FFD700; border:2px solid #0000FF; color:#0000FF; padding:6px 20px; border-radius:40px;
            display:inline-block; margin-bottom:15px; font-weight:bold;
        }
        header { text-align:center; margin-bottom:2rem; }
        header h1 { font-size:2.5rem; color:#e63946; display:flex; align-items:center; justify-content:center; gap:15px; }
        header h1 i { color:#f39c12; }
        .info-horario {
            display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap;
            margin:10px 0 20px; background:#fff5f0; padding:10px 20px; border-radius:50px;
            border:1px solid #e63946;
        }
        .info-horario i { color:#e63946; margin-right:8px; }
        .horario-texto { font-size:1.1rem; font-weight:600; color:#e63946; }
        .categoria-titulo {
            background:linear-gradient(135deg,#e63946,#f39c12); color:white; padding:12px 25px;
            border-radius:0 50px 50px 0; width:fit-content; margin:30px 0 20px -20px;
            box-shadow:0 8px 20px rgba(230,57,70,0.3);
        }
        .tabela-wrapper { overflow-x:auto; margin:20px 0; }
        table { width:100%; border-collapse:collapse; min-width:300px; background:white; border-radius:20px; overflow:hidden; }
        th { background:#e63946; color:white; padding:12px; font-size:1rem; }
        td { padding:10px; border-bottom:1px solid #ffe0d0; font-size:0.95rem; word-break:break-word; }
        .preco { font-weight:700; color:#e67e22; white-space:nowrap; }
        .pedido-section {
            background:#fff5f0; border-radius:32px; padding:2rem; border:2px dashed #e63946; margin-top:2rem;
        }
        .pedido-section h2 { font-size:2rem; color:#e63946; display:flex; align-items:center; gap:12px; margin-bottom:1rem; }
        .form-grid {
            display:grid; grid-template-columns:repeat(auto-fit, minmax(260px,1fr)); gap:1.5rem; margin:2rem 0;
        }
        .campo { display:flex; flex-direction:column; gap:0.3rem; }
        .campo.full-width { grid-column:1/-1; }
        label { font-weight:600; color:#e63946; font-size:1.1rem; }
        input, select, textarea {
            padding:0.9rem 1rem; border:2px solid #f39c12; border-radius:24px; font-size:1rem;
        }
        .whatsapp-btn {
            background:#25d366; color:white; font-size:1.5rem; font-weight:700; padding:1.2rem 2rem;
            border:none; border-radius:60px; display:flex; align-items:center; justify-content:center;
            gap:15px; cursor:pointer; width:100%; max-width:500px; margin:1.5rem auto; transition:0.2s;
        }
        .whatsapp-btn:hover { transform:scale(1.02); }
        footer { text-align:center; margin-top:2rem; padding-top:1rem; border-top:2px solid #ffe0d0; color:#e63946; }
        @media (max-width:600px) {
            .container { padding:1rem; }
            header h1 { font-size:2rem; }
            .info-horario { flex-direction:column; text-align:center; gap:10px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <button class="btn-voltar" onclick="window.location.href='../../../../index.html'"><i class="fas fa-home"></i> Início</button>
        <div style="text-align:center;"><span class="subbairro-tarja"><i class="fas fa-map-pin"></i> Sub‑bairro</span></div>
        <header>
            <h1><i class="fas fa-store"></i> NOME DO ESTABELECIMENTO</h1>
            <p>📍 Endereço completo</p>
        </header>
        <div class="info-horario">
            <span><i class="fas fa-clock"></i> <strong>Horário:</strong></span>
            <span class="horario-texto"><i class="fas fa-calendar-alt"></i> Todos os dias • 14h às 23h</span>
        </div>
        <div class="categoria-titulo">🍔 Lanches</div>
        <div class="tabela-wrapper">
            <table>
                <thead><tr><th>Produto</th><th>Descrição</th><th>Preço</th></tr></thead>
                <tbody>
                    <tr><td>Produto 1</td><td>Descrição</td><td class="preco">R$ 00,00</td></tr>
                    <tr><td>Produto 2</td><td>Descrição</td><td class="preco">R$ 00,00</td></tr>
                </tbody>
            </table>
        </div>
        <section class="pedido-section">
            <h2><i class="fab fa-whatsapp"></i> Faça seu pedido</h2>
            <form id="formPedido">
                <div class="form-grid">
                    <div class="campo"><label>Nome *</label><input type="text" id="nome" required></div>
                    <div class="campo"><label>Endereço *</label><input type="text" id="endereco" required></div>
                    <div class="campo">
                        <label>Pagamento *</label>
                        <select id="pagamento" required>
                            <option value="">Selecione</option>
                            <option value="Dinheiro">Dinheiro</option>
                            <option value="Cartão">Cartão</option>
                            <option value="Pix">Pix</option>
                        </select>
                    </div>
                    <div class="campo"><label>Telefone</label><input type="tel" id="telefone"></div>
                    <div class="campo full-width"><label>Pedido *</label><textarea id="descricao" rows="3" required></textarea></div>
                </div>
                <button type="button" class="whatsapp-btn" id="gerarLink"><i class="fab fa-whatsapp"></i> Enviar</button>
            </form>
        </section>
        <footer><p><i class="fab fa-whatsapp"></i> (21) 99999-9999</p></footer>
    </div>
    <div style="background:#25d366; color:white; padding:12px; border-radius:60px; text-align:center; margin:20px 0;">
        <span id="contadorPedidos">0</span> pedidos
    </div>
    <script>
        let chave = 'pedidos_cliente';
        let contador = localStorage.getItem(chave) ? parseInt(localStorage.getItem(chave)) : 0;
        document.getElementById('contadorPedidos').innerText = contador;
        document.getElementById('gerarLink').addEventListener('click', function() {
            contador++;
            localStorage.setItem(chave, contador);
            document.getElementById('contadorPedidos').innerText = contador;
            alert('Pedido enviado! (simulação)');
        });
    </script>
</body>
</html>
